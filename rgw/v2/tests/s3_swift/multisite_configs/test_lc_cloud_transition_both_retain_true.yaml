#test_bucket_lifecycle_object_expiration_transition.py
#Cloud Tier Setup - Both IBM and AWS with retain_head=true
#Only configures CLOUDIBM and CLOUDAWS tiers, no transition or restore testing
config:
  user_count: 1
  bucket_count: 1
  objects_count: 0
  parallel_lc: False
  test_lc_transition: True
  enable_resharding: True
  sharding_type: manual
  shards: 211
  pool_name: data.cold
  storage_class: cold
  ec_pool_transition: False
  multiple_transitions: True
  two_pool_transition: False
  second_pool_name: data.glacier
  second_storage_class: glacier
  remote_zone: secondary
  objects_size_range:
    min: 5
    max: 15
  test_ops:
    create_bucket: false
    create_object: false
    test_cloud_transition: true
    test_pool_transition: false
    enable_both_cloud_tiers: true
    test_ibm_cloud_transition: false
    test_aws_cloud_transition: false
    test_retain_head: true
    aws_endpoint: "https://s3.eu-north-1.amazonaws.com"
    aws_region: "eu-north-1"
    aws_location_constraint: "eu-north-1"
  rgw_lc_debug_interval: 30
  rgw_enable_lc_threads: True
  rgw_lifecycle_work_time: "00:00-23:59"
  rgw_lc_max_worker: 3
  rgw_lc_max_wp_worker: 3
