#test_bucket_lifecycle_object_expiration_transition.py
#CEPH-83591622, CEPH-83591672, CEPH-83591621
config:
  user_count: 1
  bucket_count: 1
  objects_count: 10
  parallel_lc: False
  test_lc_transition: True
  enable_resharding: True
  sharding_type: manual
  shards: 211
  pool_name: data.cold
  storage_class: cold
  ec_pool_transition: False
  multiple_transitions: True
  two_pool_transition: False
  second_pool_name: data.glacier
  second_storage_class: glacier
  remote_zone: secondary
  objects_size_range:
    min: 5
    max: 15
  test_ops:
    create_bucket: true
    create_object: true
    enable_versioning: true
    version_count: 3
    delete_marker: false
    test_cloud_transition: true
    test_pool_transition: false
    test_ibm_cloud_transition: true
    test_aws_cloud_transition: false
    test_retain_head: true
    test_cloud_transition_at_remote: false
    test_s3_restore_from_cloud: true
    # Cloud transition bug verification
    # Bugs: #68324 (multipart part number 0), #67560 (ETag double quotes), #67685 (Days=0 restore)
    verify_cloud_bugs: true
    verify_multipart_bug: true  # Check multipart part number 0 bug (#68324)
    verify_etag_bug: true  # Check ETag double quotes bug (#67560)
    verify_days_zero_bug: false  # Check Days=0 restore bug (#67685) - optional, can be disruptive
  lifecycle_conf:
    - ID: LC_Rule_1
      Filter:
        Prefix: key1
      Status: Enabled
      Transitions:
        - Days: 2
          StorageClass: CLOUDIBM
      NoncurrentVersionTransitions:
        - NoncurrentDays: 1
          StorageClass: CLOUDIBM
  restore_wait_time: 900  # Max time to wait for restore completion (seconds) - 15 minutes
  restore_poll_interval: 45  # Check restore status every 45 seconds
  restore_parallel_workers: 10  # Number of parallel restore operations (default: 10)
