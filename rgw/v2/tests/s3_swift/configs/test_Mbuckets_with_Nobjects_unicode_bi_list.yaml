# Test bucket index listing with unicode characters
# Reproducer for unicode bi list backward iteration bug
# script: ceph-qe-scripts/rgw/v2/tests/s3_swift/test_Mbuckets_with_Nobjects.py
config:
  user_count: 1
  bucket_count: 1
  objects_count: 1  # Minimal - our test creates its own objects
  objects_size_range:
    min: 5
    max: 10
  local_file_delete: true  # Clean up files after upload
  test_ops:
    create_bucket: true
    create_object: true  # Need this to be true for test to run
    download_object: false
    delete_bucket_object: false
    test_unicode_bi_list: true  # Enable our custom test
    sharding:
      enable: false
      max_shards: 0
    compression:
      enable: false
      type: zlib
