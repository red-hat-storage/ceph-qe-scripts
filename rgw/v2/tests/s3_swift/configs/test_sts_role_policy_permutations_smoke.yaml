# Smoke: sampled STS role policy permutations (Effect/Resource/Condition/scope)
# script: test_sts_role_policy_field_permutations.py
config:
  user_count: 2
  user_type: tenanted
  bucket_count: 1
  objects_count: 1
  objects_size_range:
    min: 5
    max: 15
  test_ops:
    tenant_name: MountEverest
    same_bucket_owner_and_principal: false
    permutation_effects: [Allow, Deny]
    permutation_conditions: [none, aws_secure_transport, s3_prefix]
    permutation_condition_variants: [match, mismatch]
    permutation_policy_scopes: [role_only, role_and_session]
    permutation_s3_actions:
      - s3:GetObject
      - s3:PutObject
      - s3:DeleteObject
      - s3:ListBucket
      - s3:CreateBucket
    permutation_resource_types: auto
    permutation_max_cases: 40
    permutation_stop_on_failure: false
