# IgnorePublicAcls with non-tenanted RGW account IAM user (path-style /bucket/key)
# script: test_public_access_block_rgw_accounts.py
config:
  objects_count: 20
  objects_size_range:
    min: 5
    max: 15
  test_ops:
    use_tenanted_account: false
    region: shared
    put_public_access_block: true
    public_access_block_config:
      {
        "IgnorePublicAcls": true
      }
    verify_public_acl: true
