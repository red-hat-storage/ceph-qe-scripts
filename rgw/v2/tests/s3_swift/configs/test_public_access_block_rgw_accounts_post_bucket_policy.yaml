# Policy first, then BlockPublicPolicy; anonymous access should still work
# script: test_public_access_block_rgw_accounts.py
config:
  objects_count: 20
  objects_size_range:
    min: 5
    max: 15
  test_ops:
    tenant_name: rgwacctenant
    region: shared
    put_public_access_block_post_bucket_policy: true
    public_access_block_config:
      {
        "BlockPublicPolicy": true
      }
    policy_document:
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Action": "s3:*",
            "Principal": {"AWS": "*"},
            "Resource": "arn:aws:s3:::*",
            "Effect": "Allow",
            "Sid": "statement1",
          }
        ],
      }
