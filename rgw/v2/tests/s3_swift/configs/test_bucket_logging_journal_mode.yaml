config:
  user_count: 1
  bucket_count: 2
  objects_count: 10
  objects_size_range:
    min: 5
    max: 15
  test_ops:
    create_bucket: true
    create_object: true
    copy_object: true
    enable_version: false
    put_get_bucket_logging: true
    upload_type: normal
    delete_bucket_object: true
    logging_type: Journal
    target_obj_key_format: SimplePrefix
    policy_document:
     {
       "Version": "2012-10-17",
       "Statement": [
        {
         "Sid": "AllowLoggingFromSourceBucketPolicy1",
         "Effect": "Allow",
         "Principal": {
          "Service": "logging.s3.amazonaws.com"
         },
         "Action": "s3:PutObject",
         "Resource": "arn:aws:s3:::<dest_bucket_name>/*",
         "Condition": {
          "StringEquals": {
           "aws:SourceAccount": "<source_user_name>"
          },
          "ArnLike": {
           "aws:SourceArn": "arn:aws:s3:::<source_bucket_name>"
          }
         }
        }
       ]
     }