# script: ceph-qe-scripts/rgw/v2/tests/aws/test_conditional_delete.py
# Conditional put multipart upload with if-none-match:
# - 1st upload (key does not exist) succeeds
# - 2nd upload (key exists) fails
config:
  user_count: 1
  bucket_count: 1
  objects_size_range:
    min: 15M
    max: 15M
  split_size: 5
  local_file_delete: true
  test_ops:
    conditional_put_multipart_if_none_match: true
